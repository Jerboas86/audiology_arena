name: CI and Deploy

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HUSKY: 0
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      PRIVATE_AWS_REGION: ${{ secrets.PRIVATE_AWS_REGION }}
      PRIVATE_AWS_ACCESS_KEY_ID: ${{ secrets.PRIVATE_AWS_ACCESS_KEY_ID }}
      PRIVATE_AWS_SECRET_ACCESS_KEY: ${{ secrets.PRIVATE_AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install

      - name: Lint
        run: pnpm lint

      - name: Unit test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HUSKY: 0
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      PRIVATE_AWS_REGION: ${{ secrets.PRIVATE_AWS_REGION }}
      PRIVATE_AWS_ACCESS_KEY_ID: ${{ secrets.PRIVATE_AWS_ACCESS_KEY_ID }}
      PRIVATE_AWS_SECRET_ACCESS_KEY: ${{ secrets.PRIVATE_AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install

      - name: Lint
        run: pnpm lint

      - name: Unit test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Send to Cloudflare Worker
        run: pnpm exec wrangler deploy
